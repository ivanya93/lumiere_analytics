# dbt_project.yml

name: lumiere
version: '1.0.0'
config-version: 2

profile: lumiere        

model-paths:  ["models"]
test-paths:   ["tests"]
seed-paths:   ["seeds"]
macro-paths:  ["macros"]
target-path:  "target"
clean-targets: ["target", "dbt_packages"]

models:
  lumiere:
    staging:
      +materialized: view       # staging models are views — cheap, always fresh
      +schema: staging
    intermediate:
      +materialized: table      # intermediate models are tables — joins are expensive
      +schema: intermediate
    marts:
      +materialized: table      # mart models are tables — Tableau reads these directly
      +schema: marts
